services:
  stock-dashboard:
    build: .
    image: stock-report-dashboard:latest
    ports:
      - "8501:8501"
    volumes:
      # data/ 挂载到宿主机，容器内生成的新报告可持久化，重建镜像不丢数据
      - ./data:/app/data
      # 挂载宿主机已登录的 claude 配置，容器内 claude CLI 直接复用鉴权，无需重复登录
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
    environment:
      # 如果不用挂载 ~/.claude 鉴权，也可以改用 API Key 方式（二选一）
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
